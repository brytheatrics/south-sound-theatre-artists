<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<!-- Theme bootstrap: applied before paint so we don't flash light
		     tokens on a dark-mode user. Reads the persisted preference
		     ('light' | 'dark' | absent = auto) and falls through to the
		     OS prefers-color-scheme. The class lands on <html> so it's
		     ready before <body> exists. -->
		<script>
			(function () {
				try {
					var pref = localStorage.getItem("ssta_theme");
					var dark =
						pref === "dark" ||
						(pref !== "light" &&
							window.matchMedia("(prefers-color-scheme: dark)").matches);
					if (dark) document.documentElement.classList.add("mode-dark");
				} catch (e) {
					// localStorage / matchMedia unavailable; default light.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body class="theme-paper" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
