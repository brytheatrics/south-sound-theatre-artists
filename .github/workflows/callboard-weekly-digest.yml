name: Callboard weekly digest

# Sunday late-night: emails every active subscriber a digest of new
# callboard posts matching their discipline / post-type filters since
# their last digest. Skips subscribers with nothing new.
#
# Timing rationale: send AFTER all Sunday performances have ended so a
# show whose final curtain is Sunday evening doesn't get filtered as
# "already closed" before its last performance happens. Also lands in
# inboxes for Monday morning.

on:
  schedule:
    # 06:59 UTC Monday = 11:59 PM PT Sunday (PDT) / 10:59 PM PT Sunday
    # (PST). GitHub Actions schedules don't follow DST, so the wall-
    # clock send time shifts by one hour twice a year - both options
    # still land well past Sunday evening show end times.
    - cron: "59 6 * * 1"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Send digest
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        run: node scripts/callboard-weekly-digest.mjs
