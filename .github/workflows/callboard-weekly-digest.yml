name: Callboard weekly digest

# Sunday evening: emails every active subscriber a digest of new
# callboard posts matching their discipline / post-type filters since
# their last digest. Skips subscribers with nothing new.

on:
  schedule:
    - cron: "0 1 * * 1" # 01:00 UTC Monday = 5pm/6pm PT Sunday
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Send digest
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        run: node scripts/callboard-weekly-digest.mjs
